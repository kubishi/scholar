<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - Kubishi Scholar</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/styles.css">
    <link rel="icon" href="/img/logo_bg.png" type="image/png">
</head>
<body class="page-about">
    <nav class="navbar navbar-expand-lg shadow-sm">
        <div class="container-fluid">
            <a class="navbar-brand d-flex align-items-center" href="/">
                <img src="/img/logo_bg.png" alt="Kubishi" height="40" class="menu_logo rounded-2 me-2">
                <span class="title_subtext">Kubishi Scholar</span>
            </a>
            <div class="d-flex align-items-center">
                <a href="/" class="btn btn-sm btn-dark me-2">Home</a>
            </div>
        </div>
    </nav>

    <picture class="bg-image">
        <img src="/img/background3.jpg" alt="" class="w-full h-screen object-cover">
    </picture>

    <div class="container py-4">
        <div id="profile-loading" class="text-center py-5">Loading profile…</div>
        <div id="profile-error" class="alert alert-danger" style="display: none;">Profile not found.</div>
        <div id="profile-card" class="card shadow-sm" style="display: none;">
            <div class="card-header bg-light">
                <h5 class="mb-0 fw-semibold">Profile</h5>
            </div>
            <div class="card-body small">
                <div class="mb-3">
                    <div class="text-muted text-uppercase fw-semibold" style="font-size: 0.75rem;">Name</div>
                    <div id="profile-name"></div>
                </div>
                <div class="mb-3">
                    <div class="text-muted text-uppercase fw-semibold" style="font-size: 0.75rem;">Email</div>
                    <div id="profile-email"></div>
                </div>
                <div class="mb-3">
                    <div class="text-muted text-uppercase fw-semibold" style="font-size: 0.75rem;">Research interests</div>
                    <div id="profile-interests"></div>
                </div>
                <div class="mb-3">
                    <div class="text-muted text-uppercase fw-semibold" style="font-size: 0.75rem;">University</div>
                    <div id="profile-university"></div>
                </div>
                <div class="mb-3">
                    <div class="text-muted text-uppercase fw-semibold" style="font-size: 0.75rem;">Website</div>
                    <div id="profile-website"></div>
                </div>
                <div class="mb-3">
                    <div class="text-muted text-uppercase fw-semibold" style="font-size: 0.75rem;">Github</div>
                    <div id="profile-github"></div>
                </div>
                <div class="mb-3">
                    <div class="text-muted text-uppercase fw-semibold" style="font-size: 0.75rem;">LinkedIn</div>
                    <div id="profile-linkedin"></div>
                </div>
                <div class="mb-3">
                    <div class="text-muted text-uppercase fw-semibold" style="font-size: 0.75rem;">ORCID</div>
                    <div id="profile-orcid"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/config.js"></script>
    <script src="/js/profile-public.js"></script>
</body>
</html>
